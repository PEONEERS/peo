<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PEONEER</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #050507;
    color: white;
    overflow-x: hidden;
}

/* ЛОАДЕР */
.loader {
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 99999;
    flex-direction: column;
}

.loader h1 {
    color: #a855f7;
    animation: pulse 1s infinite;
}

/* ГЛИТЧ */
.glitch {
    position: relative;
    font-size: 60px;
    color: white;
}

.glitch::before,
.glitch::after {
    content: "PEONEER";
    position: absolute;
    left: 0;
}

.glitch::before {
    color: red;
    animation: glitch 1s infinite;
}

.glitch::after {
    color: blue;
    animation: glitch 1s infinite reverse;
}

@keyframes glitch {
    0% { transform: translate(0); }
    20% { transform: translate(-2px,2px); }
    40% { transform: translate(-2px,-2px); }
    60% { transform: translate(2px,2px); }
    80% { transform: translate(2px,-2px); }
    100% { transform: translate(0); }
}

/* НЕОН */
.glow {
    color: #c084ff;
    text-shadow: 0 0 20px #7b2cff;
}

/* HERO */
.hero {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    text-align: center;
}

/* КНОПКИ */
.btn {
    display: inline-block;
    margin: 10px;
    padding: 12px 25px;
    border-radius: 12px;
    background: #7b2cff;
    color: white;
    text-decoration: none;
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.1);
    box-shadow: 0 0 30px #a855f7;
}

/* КАРТОЧКИ */
.card {
    max-width: 900px;
    margin: 80px auto;
    padding: 30px;
    border-radius: 20px;
    background: rgba(20,20,30,0.8);
    backdrop-filter: blur(10px);
    box-shadow: 0 0 40px rgba(140, 0, 255, 0.3);
    opacity: 0;
    transform: translateY(40px);
    transition: 1s;
}

.card.visible {
    opacity: 1;
    transform: translateY(0);
}
</style>
</head>

<body>

<!-- ЛОАДЕР -->
<div class="loader" id="loader">
    <h1>LOADING...</h1>
</div>

<!-- HERO -->
<section class="hero">
    <h1 class="glitch">PEONEER</h1>
    <p>Живой стрим • Разные игры • Без фильтров</p>

    <a href="https://twitch.tv/peoneer_play" class="btn">СМОТРЕТЬ</a>
</section>

<!-- ОБО МНЕ -->
<div class="card">
    <h2 class="glow">ОБО МНЕ</h2>
    <p>Я создаю движ. Каждый стрим — это эмоции и живое общение.</p>
</div>

<!-- СЕТАП -->
<div class="card">
    <h2 class="glow">МОЙ ПК</h2>
    <p>i9 12900KF • RTX 4070 • 32GB • ~9TB</p>
</div>

<script>
// LOADER
window.onload = () => {
    document.getElementById("loader").style.display = "none";
}

// SCROLL ANIMATION
const cards = document.querySelectorAll(".card");

window.addEventListener("scroll", () => {
    cards.forEach(card => {
        const pos = card.getBoundingClientRect().top;
        if (pos < window.innerHeight - 100) {
            card.classList.add("visible");
        }
    });
});
</script>

</body>
</html>
